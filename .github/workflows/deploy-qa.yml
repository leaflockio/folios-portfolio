name: Release Beta & Deploy QA

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'pre-main'
        type: string

  push:
    branches: [pre-main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-beta:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'pre-main' }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Install dependencies
        run: npm ci

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Run Semantic Release (Beta)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HUSKY: 0

      - name: Beta Release Info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "## Beta Release Published" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY

  deploy-qa:
    needs: release-beta
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'pre-main' }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.event.inputs.branch || 'pre-main' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Install dependencies
        run: npm ci

      - name: Run Verify
        run: npm run verify

      - name: Build
        run: npm run build -- --mode qa
        env:
          FP_FIRST_NAME: ${{ secrets.FP_FIRST_NAME }}
          FP_LAST_NAME: ${{ secrets.FP_LAST_NAME }}
          FP_PROFILE_PATH: ${{ secrets.FP_PROFILE_PATH }}
          FP_EMAIL: ${{ secrets.FP_EMAIL }}
          FP_PHONE_COUNTRY_CODE: ${{ secrets.FP_PHONE_COUNTRY_CODE }}
          FP_PHONE_NUMBER: ${{ secrets.FP_PHONE_NUMBER }}
          FP_SHOW_CONTACT_ON_ERROR: ${{ secrets.FP_SHOW_CONTACT_ON_ERROR }}

      - name: Deploy to Netlify (QA)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_QA_SITE_ID }}

      - name: Deployment Summary
        run: |
          echo "## QA Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.event.inputs.branch || 'pre-main' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release-beta.outputs.new_release_version || 'No new release' }}" >> $GITHUB_STEP_SUMMARY
