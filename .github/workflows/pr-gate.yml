name: PR Gate

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR source branch
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          if [ "$TARGET_BRANCH" = "main" ] && [ "$SOURCE_BRANCH" != "pre-main" ]; then
            echo "## PR Rejected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "PRs to \`main\` must come from \`pre-main\` branch only." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Your source branch:** \`$SOURCE_BRANCH\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Workflow:" >> $GITHUB_STEP_SUMMARY
            echo "1. Merge your feature branch into \`pre-main\`" >> $GITHUB_STEP_SUMMARY
            echo "2. Then create a PR from \`pre-main\` to \`main\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "## PR Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "Source branch \`$SOURCE_BRANCH\` is allowed to merge into \`main\`." >> $GITHUB_STEP_SUMMARY

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Install dependencies
        run: npm ci

      - name: Run Verify
        run: npm run verify

      - name: Run Build
        run: npm run build
